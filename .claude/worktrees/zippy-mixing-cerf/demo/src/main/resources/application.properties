# Server Configuration
server.port=8080

# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/ecoroute?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Third-Party API Base URLs
google.maps.api.url=https://routes.googleapis.com/
climatiq.api.url=https://api.climatiq.io/v1/

# API Keys — set real values in application-local.properties (gitignored)
google.maps.api.key=YOUR_GOOGLE_MAPS_API_KEY
climatiq.api.key=YOUR_CLIMATIQ_API_KEY
spring.ai.openai.api-key=YOUR_OPENAI_API_KEY
spring.ai.openai.chat.options.model=gpt-4o

# Loads application-local.properties if it exists (keeps secrets off git)
spring.config.import=optional:classpath:application-local.properties
